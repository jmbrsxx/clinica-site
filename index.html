<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clínica Odonto Exemplo | Modelo de Site</title>

    <meta name="description" content="Este é um site demonstrativo de clínica odontológica, criado como exemplo de layout moderno e responsivo." />
    <meta name="author" content="Modelo de Demonstração" />

    <!-- Open Graph -->
    <meta property="og:title" content="Clínica Odonto Exemplo | Modelo de Site" />
    <meta property="og:description" content="Site de demonstração para clínicas odontológicas. Layout moderno e otimizado para conversão." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://raw.githubusercontent.com/jmbrsxx/clinica-site/refs/heads/main/public/image.png" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@exemplo" />
    <meta property="twitter:image" content="https://raw.githubusercontent.com/jmbrsxx/clinica-site/refs/heads/main/public/image.png" />  
    
  </head>

  <body>
    <div id="root"></div>

    <script type="text/javascript">
      // SPA GitHub Pages fix
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
